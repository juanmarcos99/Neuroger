name: Android CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 1. Usamos JDK 17 temporalmente para que las herramientas de Android no den error
    - name: Configurar JDK 17 (para herramientas)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Instalar NDK y CMake
      uses: android-actions/setup-android@v3
      env:
        SKIP_JDK_VERSION_CHECK: "true"
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
      with:
        packages: "ndk;21.4.7075529 cmake;3.18.1"

    # 2. Volvemos a JDK 11 para la compilación real del proyecto
    - name: Configurar JDK 11 (para compilación)
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Dar permisos de ejecución a gradlew
      run: chmod +x gradlew

    - name: Compilar APK de Debug
      run: ./gradlew assembleDebug

    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: NeuroGer-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
